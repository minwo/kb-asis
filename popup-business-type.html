<div class="bottom-sheet-overlay" id="bizTypeOverlay"></div>
<div class="bottom-sheet" id="bizTypeBottomSheet">
	<div class="bottom-sheet-header">
		<h2 class="bottom-sheet-title">사업장 업종 선택</h2>
		<button class="bottom-sheet-close" id="bizTypeClose">
			<i class="icons close"></i>
		</button>
	</div>
	<div class="bottom-sheet-content">
		<div class="business-type-item" data-type="0001">일반음식점(주류 판매)</div>
		<div class="divider"></div>
		<div class="business-type-item" data-type="0002">휴게음식점(주류 미판매)</div>
		<div class="divider"></div>
		<div class="business-type-item" data-type="0003">소형판매시설</div>
		<div class="divider"></div>
		<div class="business-type-item" data-type="0004">학원(정비학원 제외)</div>
		<div class="divider"></div>
		<div class="business-type-item" data-type="0005">오피스텔</div>
	</div>
</div>

<style>
	.bottom-sheet-overlay {
		display: none;
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		background: rgba(0, 0, 0, 0.5);
		z-index: 99;
		transition: opacity 0.3s ease-in-out;
	}

	.bottom-sheet-overlay.show {
		display: block;
		opacity: 1;
	}

	.bottom-sheet {
		display: none;
		position: fixed;
		bottom: 0;
		left: 0;
		right: 0;
		background: #fff;
		border-radius: 12px 12px 0 0;
		z-index: 100;
		max-height: 70vh;
		overflow-y: auto;
		animation: slideUp 0.3s ease-in-out;
	}

	.bottom-sheet.show {
		display: block;
	}

	@keyframes slideUp {
		from {
			transform: translateY(100%);
		}

		to {
			transform: translateY(0);
		}
	}

	.bottom-sheet-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 16px 20px;
		border-bottom: 1px solid #f0f0f0;
		position: sticky;
		top: 0;
		background: #fff;
	}

	.bottom-sheet-title {
		font-size: 16px;
		font-weight: 600;
		margin: 0;
		padding: 0;
	}

	.bottom-sheet-close {
		background: none;
		border: none;
		font-size: 24px;
		cursor: pointer;
		padding: 0;
		width: 24px;
		height: 24px;
		display: flex;
		align-items: center;
		justify-content: center;
	}

	.bottom-sheet-content {
		padding: 0;
	}

	.business-type-item {
		padding: 16px 20px;
		cursor: pointer;
		font-size: 14px;
		color: #333;
		transition: background-color 0.2s;
	}

	.business-type-item:hover {
		background-color: #f5f5f5;
	}

	.divider {
		height: 1px;
		background-color: #f0f0f0;
		margin: 0;
	}
</style>

<script>
	document.addEventListener('DOMContentLoaded', function () {
		const overlay = document.getElementById('bizTypeOverlay');
		const bottomSheet = document.getElementById('bizTypeBottomSheet');
		const closeBtn = document.getElementById('bizTypeClose');
		const items = document.querySelectorAll('.business-type-item');

		// 팝업 열기
		window.openBizTypePopup = function () {
			overlay.classList.add('show');
			bottomSheet.classList.add('show');
			document.body.style.overflow = 'hidden';
		};

		// 팝업 닫기
		function closeBizTypePopup() {
			overlay.classList.remove('show');
			bottomSheet.classList.remove('show');
			document.body.style.overflow = 'auto';
		}

		// 닫기 버튼 클릭
		closeBtn.addEventListener('click', closeBizTypePopup);

		// 오버레이 클릭
		overlay.addEventListener('click', closeBizTypePopup);

		// 항목 선택
		items.forEach(item => {
			item.addEventListener('click', function () {
				const type = this.getAttribute('data-type');
				const text = this.textContent;
				console.log('선택된 업종:', type, text);

				// 선택 결과를 부모 페이지에 전달
				if (window.parent && window.parent.selectBusinessType) {
					window.parent.selectBusinessType(type, text);
				}

				closeBizTypePopup();
			});
		});
	});
</script>
